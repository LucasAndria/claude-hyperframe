<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <style>
      * { box-sizing: border-box; }
      html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #05070d; font-family: system-ui, sans-serif; }
      #stage { position: relative; width: 100%; height: 100%; overflow: hidden; }

      /* dark explainer background: navy gradient + vignette + very soft glow */
      #scene-bg { position: absolute; inset: -40px; background:
        radial-gradient(60% 50% at 35% 40%, rgba(70,123,157,0.18), transparent 70%),
        linear-gradient(160deg, #0a0f1c 0%, #05070d 100%); }
      #vignette { position: absolute; inset: 0; pointer-events: none;
        box-shadow: inset 0 0 240px rgba(0,0,0,0.7); }

      .layer { position: absolute; }
      #headline { left: 80px; top: 250px; width: 620px; opacity: 0;
        color: #eaf1f7; font-size: 64px; font-weight: 800; line-height: 1.08; }
      #headline .accent { color: #5ec9b0; }
      #card { right: 90px; top: 230px; width: 360px; opacity: 0;
        background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.10);
        border-radius: 16px; padding: 28px 30px; color: #cdd9e5; font-size: 24px; line-height: 1.35;
        box-shadow: 0 20px 60px rgba(0,0,0,0.45); }
      #card .k { color: #e9b54a; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; font-size: 16px; }

      /* PIP presenter: rounded rect, subtle shadow + thin border, bottom-right */
      #pip { right: 44px; bottom: 44px; width: 300px; height: 200px; opacity: 0;
        border-radius: 14px; overflow: hidden; border: 1px solid rgba(255,255,255,0.14);
        box-shadow: 0 18px 50px rgba(0,0,0,0.5);
        background: radial-gradient(70% 70% at 50% 35%, #2a3a4d, #131c28); }
      #pip .badge { position: absolute; left: 14px; bottom: 12px; color: #dfe8f0; font-size: 18px; font-weight: 700; }
    </style>
  </head>
  <body>
    <div id="stage" data-composition-id="ref-explainer-demo" data-start="0" data-duration="8" data-fps="30" data-width="1280" data-height="720">
      <div id="scene-bg" class="layer" data-track-index="0"></div>
      <div id="vignette"></div>

      <h1 id="headline" class="layer clip" data-start="0" data-duration="8" data-track-index="2">
        Ship <span class="accent">cinematic</span> motion, automatically.
      </h1>

      <div id="card" class="layer clip" data-start="0" data-duration="8" data-track-index="3">
        <div class="k">Reference style</div>
        Restrained push-ins, parallax, and stable PIP — no random float.
      </div>

      <div id="pip" class="layer clip" data-start="0" data-duration="8" data-track-index="4">
        <div class="badge">Presenter</div>
      </div>

      <script src="vendor/gsap.min.js"></script>
      <script src="vendor/motion-style.js"></script>
      <script src="vendor/reference-motion.js"></script>
      <script>
        (function () {
          var RM = window.RefMotion;
          var tl = window.gsap.timeline({ paused: true });
          var ctx = { startSec: 0, sceneDuration: 8, fps: 30, seed: "demo-scene", canvas: { w: 1280, h: 720 } };

          // 1) Background drifts slowly (parallax: bg slow, card faster/foreground).
          RM.applyParallaxMotion(tl, [
            { el: "#scene-bg", depth: 0.1 },
            { el: "#card", depth: 0.7 },
          ], ctx);

          // 2) Headline reveals (fade + 20px up + slight scale), card 8 frames later (stagger).
          RM.applyCardReveal(tl, "#headline", { startSec: 0.30, fps: 30 });
          RM.applyCardReveal(tl, "#card", { startSec: 0.30 + 8 / 30, fps: 30 });

          // 3) PIP presenter: quick smooth entrance, then anchored (no floating).
          RM.applyPipMotion(tl, "#pip", { startSec: 0.55, fps: 30 });

          window.__timelines = window.__timelines || {};
          window.__timelines["ref-explainer-demo"] = tl;
        })();
      </script>
    </div>
  </body>
</html>
